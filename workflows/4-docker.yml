name: 4. Збірка Docker-контейнера

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main, master ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker-build:
    name: Build & Test Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build Docker image (development stage)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: development
          push: false
          tags: ${{ env.IMAGE_NAME }}:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Run tests inside Docker container
        run: |
          echo "🐳 Running tests inside Docker container..."
          docker run --rm ${{ env.IMAGE_NAME }}:dev pytest tests/ -v --tb=short

      - name: Build production Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify production image
        run: |
          docker run --rm ${{ env.IMAGE_NAME }}:dev python -c "
          from src.calculator import add, multiply, fibonacci
          print('✅ Calculator:', add(2, 3), multiply(4, 5))
          print('✅ Fibonacci:', fibonacci(8))
          print('🐳 Docker container works correctly!')
          "

      - name: Docker image summary
        run: |
          echo "🐳 Docker Build Summary"
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          echo "Tags: ${{ steps.meta.outputs.tags }}"
          docker images | grep -E "IMAGE|${{ env.IMAGE_NAME }}" || true