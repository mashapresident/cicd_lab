name: 5. Автоматичний HTML-звіт

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-report:
    name: Generate Test Report & Deploy to Pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-json-report pytest-cov

      - name: Run tests with JSON output + Coverage
        run: |
          pytest tests/ \
            --json-report \
            --json-report-file=reports/test_results.json \
            --cov=src \
            --cov-report=json:reports/coverage.json \
            --cov-report=html:reports/htmlcov \
            --tb=short \
            -v
        continue-on-error: true

      - name: Generate custom HTML report
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
        run: |
          python reports/generate_report.py \
            reports/test_results.json \
            reports/coverage.json \
            reports/test_report.html

      - name: Prepare Pages directory
        run: |
          mkdir -p pages_output
          cp reports/test_report.html pages_output/index.html
          cp -r reports/htmlcov pages_output/coverage || true
          echo "📊 Pages directory prepared"
          ls -la pages_output/

      - name: Upload HTML report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ github.sha }}
          path: |
            reports/test_report.html
            reports/coverage.json
            reports/htmlcov/
          retention-days: 30

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages_output/

      - name: Print report summary
        run: |
          echo "📊 HTML Report generated!"
          echo "Artifact: test-report-${{ github.sha }}"
          echo "File: reports/test_report.html"

  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: generate-report
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Report URL
        run: |
          echo "🌐 Report deployed to: ${{ steps.deployment.outputs.page_url }}"
          echo "✅ GitHub Pages deployment complete!"