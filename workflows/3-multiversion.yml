name: 3. Мультиверсійне тестування

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-matrix:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
        os: [ubuntu-latest, windows-latest, macos-latest]
        exclude:
          # Reduce matrix size for demo purposes
          - os: windows-latest
            python-version: "3.9"
          - os: macos-latest
            python-version: "3.9"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Display Python version
        run: python --version

      - name: Run tests on Python ${{ matrix.python-version }}
        run: |
          pytest tests/ --verbose --tb=short -v

      - name: Test summary
        if: always()
        run: |
          python -c "import sys; print(f'✅ Tests passed on Python {sys.version}')"

  compatibility-report:
    name: Compatibility Summary
    runs-on: ubuntu-latest
    needs: test-matrix
    if: always()

    steps:
      - name: Report matrix results
        run: |
          echo "🐍 Multi-version test matrix completed"
          echo "Tested Python versions: 3.9, 3.10, 3.11, 3.12"
          echo "Tested OS: Ubuntu, Windows, macOS"
          echo "Matrix result: ${{ needs.test-matrix.result }}"